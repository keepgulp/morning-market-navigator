<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>早市摊位分布图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: white; text-align: center; margin-bottom: 20px; font-size: 2em; }
    .search-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; gap: 10px; }
    .search-box input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
    .search-box input:focus { outline: none; border-color: #667eea; }
    .search-box button { padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .search-box button:hover { background: #5568d3; }
    .content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .card h2 { color: #333; margin-bottom: 15px; font-size: 1.3em; }
    .category-list, .stall-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }
    .category-item { padding: 12px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; }
    .category-item:hover { background: #e9ecef; transform: translateX(5px); }
    .category-item.active { background: #667eea; color: white; }
    .stall-item { padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .stall-item:hover { border-color: #667eea; box-shadow: 0 2px 10px rgba(102,126,234,0.2); }
    .stall-name { font-weight: bold; color: #333; margin-bottom: 5px; }
    .stall-info { font-size: 14px; color: #666; }
    .stall-rating { color: #f39c12; font-weight: bold; }
    .map-container { grid-column: 1 / -1; background: white; border-radius: 12px; padding: 20px; }
    #map { width: 100%; height: 400px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; }
    .empty-state { text-align: center; padding: 40px; color: #999; }
    @media (max-width: 768px) { .content { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏪 早市摊位分布图</h1>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索摊位名称或商品..." />
      <button onclick="search()">搜索</button>
    </div>
    <div class="content">
      <div class="card">
        <h2>📂 分类</h2>
        <div id="categoryList" class="category-list">
          <div class="empty-state">加载中...</div>
        </div>
      </div>
      <div class="card">
        <h2>🏪 摊位</h2>
        <div id="stallList" class="stall-list">
          <div class="empty-state">请选择分类</div>
        </div>
      </div>
      <div class="map-container">
        <h2>🗺️ 早市地图</h2>
        <div id="map">
          <svg id="mapSvg" width="100%" height="100%" viewBox="0 0 800 400">
            <rect x="0" y="0" width="800" height="400" fill="#f8f9fa"/>
            <text x="400" y="200" text-anchor="middle" fill="#999" font-size="20">早市地图区域</text>
          </svg>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/js/main.js"></script>
</body>
</html>
